<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 16px;
      color: #ff4444;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .row:last-child { border-bottom: none; }
    .label {
      font-size: 13px;
      color: #ccc;
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle input:checked + .slider {
      background: #ff4444;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    /* Slider */
    .slider-row {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .speed-value {
      font-size: 12px;
      color: #ff4444;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      background: #444;
      border-radius: 4px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #ff4444;
      border-radius: 50%;
      cursor: pointer;
    }
    .status {
      text-align: center;
      font-size: 11px;
      color: #888;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <h1>YouTube 中文助手</h1>

  <div class="row">
    <span class="label">字幕翻译</span>
    <label class="toggle">
      <input type="checkbox" id="translateToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span class="label">中文朗读</span>
    <label class="toggle">
      <input type="checkbox" id="ttsToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="slider-row">
    <div class="slider-header">
      <span class="label">朗读语速</span>
      <span class="speed-value" id="speedValue">1.0x</span>
    </div>
    <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
  </div>

  <div class="status" id="status">在 YouTube 视频页自动工作</div>

  <script src="popup.js"></script>
</body>
</html>
